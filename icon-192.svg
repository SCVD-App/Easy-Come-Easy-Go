<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="36" fill="#0a0a0a"/>

  <!-- Bar 3 — back left -->
  <rect x="18" y="108" width="68" height="38" rx="5" fill="#8B6914"/>
  <rect x="18" y="100" width="68" height="38" rx="5" fill="#B8900F"/>
  <rect x="18" y="96" width="68" height="16" rx="4" fill="#C9A84C"/>
  <ellipse cx="52" cy="96" rx="34" ry="6" fill="#E5C040"/>
  <!-- shine on bar 3 -->
  <rect x="26" y="99" width="20" height="4" rx="2" fill="#FFF8DC" opacity="0.35"/>

  <!-- Bar 2 — back right -->
  <rect x="106" y="108" width="68" height="38" rx="5" fill="#8B6914"/>
  <rect x="106" y="100" width="68" height="38" rx="5" fill="#B8900F"/>
  <rect x="106" y="96" width="68" height="16" rx="4" fill="#C9A84C"/>
  <ellipse cx="140" cy="96" rx="34" ry="6" fill="#E5C040"/>
  <rect x="114" y="99" width="20" height="4" rx="2" fill="#FFF8DC" opacity="0.35"/>

  <!-- Bar 1 — front centre (on top, overlapping both) -->
  <rect x="52" y="72" width="88" height="50" rx="6" fill="#8B6914"/>
  <rect x="52" y="62" width="88" height="50" rx="6" fill="#B8900F"/>
  <rect x="52" y="56" width="88" height="22" rx="5" fill="#D4A820"/>
  <ellipse cx="96" cy="56" rx="44" ry="8" fill="#E8C030"/>
  <!-- shine on front bar -->
  <rect x="62" y="60" width="28" height="6" rx="3" fill="#FFF8DC" opacity="0.4"/>
  <!-- subtle edge lines for depth -->
  <line x1="52" y1="78" x2="140" y2="78" stroke="#8B6914" stroke-width="1.5" opacity="0.6"/>

  <!-- Label text on front bar -->
  <text x="96" y="90" font-family="Georgia,serif" font-size="11" font-weight="bold"
        fill="#6B4F0A" text-anchor="middle" letter-spacing="0.5" opacity="0.7">999.9</text>

  <!-- App name below -->
  <text x="96" y="168" font-family="Georgia,serif" font-size="13" font-weight="bold"
        fill="#C9A84C" text-anchor="middle" letter-spacing="1.5">Ez C Ez G</text>
  <line x1="48" y1="155" x2="144" y2="155" stroke="#C9A84C" stroke-width="0.75" opacity="0.4"/>
</svg>
